name: AI Update Set Review

on:
  # Triggered by the "Review Update Set" UI Action in ServiceNow
  workflow_dispatch:
    inputs:
      update_set_sys_id:
        description: "ServiceNow Update Set sys_id to review"
        required: true
        type: string
      update_set_name:
        description: "Update Set display name (for logging only)"
        required: false
        type: string
      jira_ticket:
        description: "Linked Jira ticket ID (e.g. TT-1234) — extracted from description automatically if blank"
        required: false
        type: string
      model:
        description: "AI model to use (e.g. gpt-4.1, gpt-4o, o4-mini). Defaults to the github.code_review.model system property value."
        required: false
        type: string
        default: "gpt-4.1"
      api_endpoint:
        description: "AI provider base URL (e.g. https://models.inference.ai.azure.com, https://api.anthropic.com/v1, https://api.openai.com/v1). Driven by github.code_review.api_endpoint system property."
        required: false
        type: string
        default: "https://models.inference.ai.azure.com"
      force_chunked_review:
        description: "Force multi-part review output (child records + summary) even for medium update sets."
        required: false
        type: boolean
        default: false
      chunk_size:
        description: "Issues per child review record when chunking is active (recommended 6-12)."
        required: false
        type: number
        default: 8
      requested_by:
        description: "Requester identity from ServiceNow (for audit/logging)."
        required: false
        type: string
      ai_token_secret_name:
        description: "GitHub secret name holding requester's AI API token (for dynamic per-user token routing)."
        required: false
        type: string

jobs:
  review-update-set:
    runs-on: ubuntu-latest

    permissions:
      contents: read # only needs to checkout the agent script

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install review agent dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Resolve AI API token (requester-aware)
        id: resolve-ai-token
        env:
          REQUESTED_SECRET_NAME: ${{ github.event.inputs.ai_token_secret_name }}
          REQUESTED_SECRET_VALUE: ${{ secrets[github.event.inputs.ai_token_secret_name] }}
          DEFAULT_AI_API_TOKEN: ${{ secrets.AI_API_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          set -e
          TOKEN=""
          TOKEN_SOURCE="none"

          if [ -n "$REQUESTED_SECRET_NAME" ] && [ -n "$REQUESTED_SECRET_VALUE" ]; then
            TOKEN="$REQUESTED_SECRET_VALUE"
            TOKEN_SOURCE="requested-secret:$REQUESTED_SECRET_NAME"
          elif [ -n "$DEFAULT_AI_API_TOKEN" ]; then
            TOKEN="$DEFAULT_AI_API_TOKEN"
            TOKEN_SOURCE="default-secret:AI_API_TOKEN"
          else
            TOKEN="$GH_MODELS_TOKEN"
            TOKEN_SOURCE="fallback:GH_MODELS_TOKEN"
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "source=$TOKEN_SOURCE" >> "$GITHUB_OUTPUT"

      - name: Run AI Update Set Review Agent
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          AI_API_TOKEN: ${{ steps.resolve-ai-token.outputs.token }}
          UPDATE_SET_SYS_ID: ${{ github.event.inputs.update_set_sys_id }}
          UPDATE_SET_NAME: ${{ github.event.inputs.update_set_name }}
          JIRA_TICKET: ${{ github.event.inputs.jira_ticket }}
          REVIEW_MODEL: ${{ github.event.inputs.model || 'gpt-4.1' }}
          REVIEW_API_ENDPOINT: ${{ github.event.inputs.api_endpoint || 'https://models.inference.ai.azure.com' }}
          FORCE_CHUNKED_REVIEW: ${{ github.event.inputs.force_chunked_review || false }}
          REVIEW_CHUNK_SIZE: ${{ github.event.inputs.chunk_size || 8 }}
          REQUESTED_BY: ${{ github.event.inputs.requested_by }}
          AI_TOKEN_SOURCE: ${{ steps.resolve-ai-token.outputs.source }}
          SERVICENOW_INSTANCE: ${{ secrets.SERVICENOW_INSTANCE }}
          SERVICENOW_USERNAME: ${{ secrets.SERVICENOW_USERNAME }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: node review-agent.mjs
