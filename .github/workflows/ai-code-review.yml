name: AI Code Review

on:
  # Triggered by a ServiceNow UI Action via GitHub API workflow_dispatch
  workflow_dispatch:
    inputs:
      pr_number:
        description: "GitHub Pull Request number to review"
        required: true
        type: string
      snow_record:
        description: "ServiceNow record number that triggered this review (e.g. CHG0012345)"
        required: false
        type: string
      repo_owner:
        description: "GitHub repo owner (defaults to this repo owner if blank)"
        required: false
        type: string
      repo_name:
        description: "GitHub repo name (defaults to this repo if blank)"
        required: false
        type: string

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install review agent dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Post "Review in progress" comment on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ github.event.inputs.pr_number }}');
            const snowRecord = '${{ github.event.inputs.snow_record }}';
            const snowNote = snowRecord ? ` (triggered from ServiceNow **${snowRecord}**)` : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `🤖 **AI Code Review started${snowNote}**\nAnalysing the diff, fetching linked Jira/ServiceNow tickets, and will post a full review shortly.`
            });

      - name: Run AI Code Review Agent
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO_OWNER: ${{ github.event.inputs.repo_owner || github.repository_owner }}
          REPO_NAME: ${{ github.event.inputs.repo_name || github.event.repository.name }}
          SNOW_RECORD: ${{ github.event.inputs.snow_record }}
          WORKSPACE_PATH: ${{ github.workspace }}
          # Jira credentials (set in repo secrets)
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          # ServiceNow credentials (set in repo secrets)
          SERVICENOW_INSTANCE: ${{ secrets.SERVICENOW_INSTANCE }}
          SERVICENOW_USERNAME: ${{ secrets.SERVICENOW_USERNAME }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
        run: node review-agent.mjs
