name: AI Code Review

on:
  pull_request:
    types: [labeled]

jobs:
  ai-review:
    # Only run when the 'ai-review' label is added
    if: github.event.label.name == 'ai-review'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install review agent dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Post "Review in progress" comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '🤖 **AI Code Review started...** I\'m analysing the diff, fetching linked Jira/ServiceNow tickets, and will post a full review shortly.'
            });

      - name: Run AI Code Review Agent
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          WORKSPACE_PATH: ${{ github.workspace }}
          # Jira credentials (set in repo secrets)
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          # ServiceNow credentials (set in repo secrets)
          SERVICENOW_INSTANCE: ${{ secrets.SERVICENOW_INSTANCE }}
          SERVICENOW_USERNAME: ${{ secrets.SERVICENOW_USERNAME }}
          SERVICENOW_PASSWORD: ${{ secrets.SERVICENOW_PASSWORD }}
        run: node review-agent.mjs

      - name: Remove 'ai-review' label after completion
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'ai-review'
              });
            } catch (e) {
              // Label may already be removed — ignore
            }
